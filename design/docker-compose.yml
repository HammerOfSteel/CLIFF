version: '3.8'

services:
  cliff-design:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cliff-design-prototype
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: npm run dev
    stdin_open: true
    tty: true
